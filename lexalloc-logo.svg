  <!-- Tagline -->
  <text x="308" y="126" font-family="var(--font-sans)" font-size="12" font-weight="400" style="fill:rgb(180, 178, 169);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">legal invoice apportionment</text>

